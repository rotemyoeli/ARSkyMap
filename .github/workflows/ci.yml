name: OrbitMark CI

on:
  pull_request:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  docs-and-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate-docs.py
      - run: python scripts/generate-skills-registry.py && git diff --exit-code DOCS/PROJECT_SKILLS.md
      - run: bash scripts/guard-destructive-selftest.sh

  web:
    if: ${{ hashFiles('package.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check && pnpm lint && pnpm typecheck && pnpm test:unit
      - run: pnpm test:component
      - run: pnpm exec playwright install --with-deps
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-test-evidence
          path: |
            test-results/**
            playwright-report/**
            storybook-static/**

  python:
    if: ${{ hashFiles('pyproject.toml') != '' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orbitmark_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U pip
      - run: pip install -e '.[dev]'
      - run: ruff check . && mypy services packages || true
      - run: pytest --junitxml=pytest.xml --cov --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-evidence
          path: |
            pytest.xml
            coverage.xml
